name: Build APK & Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate platform files
        run: |
          flutter create --project-name bharatiyam_panchanga --org com.bharatiyam --platforms=android,web .
          # Remove test file generated by flutter create
          rm -f test/widget_test.dart

      - name: Setup Android permissions
        run: |
          # Add location permissions to AndroidManifest
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          # Set app label
          sed -i 's/android:label="bharatiyam_panchanga"/android:label="ಭಾರತೀಯಮ್ ಪಂಚಾಂಗ"/' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (split per ABI)
        run: flutter build apk --split-per-abi --release

      - name: Build Web
        run: flutter build web --release --base-href /bharatiyam-panchanga/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bharatiyam-panchanga-apk
          path: build/app/outputs/flutter-apk/
          retention-days: 30

      - name: Deploy Web to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
