name: Build APK & Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate platform files
        run: |
          flutter create --project-name bharatiyam_panchanga --org com.bharatiyam --platforms=android,web .
          rm -f test/widget_test.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href /bharatiyam-calender-/

      - name: Deploy Web to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web

  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate platform files
        run: |
          flutter create --project-name bharatiyam_panchanga --org com.bharatiyam --platforms=android,web .
          rm -f test/widget_test.dart

      - name: Setup Android
        run: |
          sed -i '/<application/i\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="bharatiyam_panchanga"/android:label="ಭಾರತೀಯಮ್ ಪಂಚಾಂಗ"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' android/app/build.gradle.kts
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 36/' android/app/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      - name: Patch all plugins to compileSdk 36
        run: |
          find ~/.pub-cache -name "build.gradle" -path "*/android/*" -type f | while read f; do
            sed -i 's/compileSdkVersion 31/compileSdkVersion 36/g' "$f"
            sed -i 's/compileSdkVersion 33/compileSdkVersion 36/g' "$f"
            sed -i 's/compileSdkVersion 34/compileSdkVersion 36/g' "$f"
            sed -i 's/compileSdk 31/compileSdk 36/g' "$f"
            sed -i 's/compileSdk 33/compileSdk 36/g' "$f"
            sed -i 's/compileSdk 34/compileSdk 36/g' "$f"
            sed -i 's/compileSdk = 31/compileSdk = 36/g' "$f"
            sed -i 's/compileSdk = 33/compileSdk = 36/g' "$f"
            sed -i 's/compileSdk = 34/compileSdk = 36/g' "$f"
          done
          echo "=== Verifying sweph ==="
          find ~/.pub-cache -path "*/sweph*" -name "build.gradle" -exec grep "compileSdk" {} \;

      - name: Build APK (split per ABI)
        run: flutter build apk --split-per-abi --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bharatiyam-panchanga-apk
          path: build/app/outputs/flutter-apk/
          retention-days: 30
